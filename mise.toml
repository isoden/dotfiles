[dotfiles]
"~/.zshrc"                     = { source = ".zshrc",                    mode = "symlink" }
"~/.config/git/config"          = { source = ".config/git/config",        mode = "symlink" }
"~/.config/git/ignore"          = { source = ".config/git/ignore",        mode = "symlink" }
"~/.config/nvim"                = { source = ".config/nvim",              mode = "symlink" }
"~/.config/ghostty/config"      = { source = ".config/ghostty/config",    mode = "symlink" }
"~/.config/mise/config.toml"    = { source = ".config/mise/config.toml",  mode = "symlink" }
"~/.config/herdr/config.toml"   = { source = ".config/herdr/config.toml", mode = "symlink" }
"~/.config/hunk/config.toml"    = { source = ".config/hunk/config.toml",  mode = "symlink" }
"~/.claude/CLAUDE.md"           = { source = "claude/CLAUDE.md",          mode = "symlink" }
"~/.claude/agents"               = { source = "claude/agents",            mode = "symlink-each" }
# claude/hooks・claude/scripts は現状未作成。mise の [dotfiles] は source が
# 存在しないエントリがあると apply 全体がエラーで停止するため、実体ができてから追加する。

# claude/skills は各 skill がサブディレクトリ (中に SKILL.md 等) を持つ2階層構造。
# symlink-each をここに使うと、既にディレクトリ全体が symlink 化済みのエントリに対して
# 再帰的にファイル単位で ln -sf をかけようとし、symlink を辿った先の実ファイルへ
# 自己参照 symlink を作って中身を破壊する（2026-07-21 実機検証で plan-html/SKILL.md が
# 実際に破壊され、git checkout で復元した）。挙動が不安定で公式ドキュメントにも
# ネスト構造での仕様記載が無いため、各 skill を個別の symlink エントリとして列挙する。
# 新しい skill を claude/skills/ に追加したら、ここにも1行追記すること。
#
# css-core-architecture は .gitignore 対象 (git 管理外) のため意図的にここへ含めない。
# 含めると、このディレクトリを持たない別マシンで clone した際に source missing で
# bootstrap 全体が止まる。使うマシンでは手動で `ln -s` するか、この行を一時的に足す。
# "~/.claude/skills/css-core-architecture" = { source = "claude/skills/css-core-architecture", mode = "symlink" }
"~/.claude/skills/deep-understanding"    = { source = "claude/skills/deep-understanding",    mode = "symlink" }
"~/.claude/skills/japanese-tech-writing" = { source = "claude/skills/japanese-tech-writing", mode = "symlink" }
"~/.claude/skills/plan-html"             = { source = "claude/skills/plan-html",             mode = "symlink" }

# 実機の `defaults read` で確認できた「明示的にカスタマイズ済みの値」のみを記載する。
# 未設定（OSデフォルトのまま）の項目は、意図した選択ではないため含めない。
[bootstrap.macos.dock]
autohide      = true
magnification = false

[bootstrap.macos.finder]
preferred_view_style = "list"
show_all_files        = true  # 隠しファイルを常に表示する

[bootstrap.macos.trackpad]
tap_to_click       = true
three_finger_drag  = false

# スクロール方向（自然なスクロール）は [bootstrap.macos.trackpad] に curated key が無いため、
# NSGlobalDomain への raw defaults 指定で表現する。false = 出荷時のデフォルト(true)から反転済み。
[bootstrap.macos.defaults]
"NSGlobalDomain" = { "com.apple.swipescrolldirection" = false }

[bootstrap.packages]
"brew:direnv"                  = "latest"
"brew:eza"                     = "latest"
"brew:ffmpeg"                  = "latest"
"brew:fzf"                     = "latest"
"brew:gh"                      = "latest"
"brew:git"                     = "latest"
"brew:herdr"                   = "latest"
"brew:hunk"                    = "latest"
"brew:lazygit"                 = "latest"
"brew:libpq"                   = "latest"
"brew:mkcert"                  = "latest"
"brew:neovim"                  = "latest"
"brew:ni"                      = "latest"
"brew:pinact"                  = "latest"
"brew:ripgrep"                 = "latest"
"brew:tig"                     = "latest"
# zsh-abbr・ax は Homebrew 非依存に移行済み。理由・導入方法は manual-tools/sync.sh と
# CLAUDE.md を参照。
"brew-cask:1password-cli"      = "latest"
"brew-cask:codex"              = "latest"
"brew-cask:font-hackgen-nerd"  = "latest"
"brew-cask:ghostty"            = "latest"
"brew-cask:visual-studio-code" = "latest"

[tasks.bootstrap]
description = "brew非依存ツール(zsh-abbr, ax)とGitHub配布skillsを同期する（mise管理対象外）"
run = [
  "./manual-tools/sync.sh",
  "./gh-skills/sync.sh",
]
dir = "{{config_root}}"
